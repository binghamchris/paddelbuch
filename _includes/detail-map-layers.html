<!--
  Detail Map Layers Include
  
  Loads the full data pipeline (spots, obstacles, protected areas, event notices)
  onto a detail page map. Reuses the same layer-control, data-loader, and 
  zoom-layer-manager modules as the main map.
  
  Prerequisites:
  - Leaflet must be loaded
  - The detail page must set window.paddelbuchMap before this include runs
  
  Parameters:
  - include.locale: Current locale (default: site.lang or 'de')
  
  Requirements: 1.7, 2.6, 2.7
-->

{% assign current_locale = include.locale | default: site.lang | default: 'de' %}

<!-- Include marker registry and filter engine modules (loaded before layer-control so they are available during marker creation) -->
<script src="{{ '/assets/js/marker-registry.js' | relative_url }}"></script>
<script src="{{ '/assets/js/filter-engine.js' | relative_url }}"></script>

<!-- Layer control: creates layer groups, popups, and global add* functions -->
{% include layer-control.html locale=current_locale %}

<!-- Include filter panel UI -->
{% include filter-panel.html %}

<!-- Marker and layer style modules -->
<script src="{{ '/assets/js/marker-styles.js' | relative_url }}"></script>
<script src="{{ '/assets/js/layer-styles.js' | relative_url }}"></script>

<!-- Data loading pipeline -->
<script src="{{ '/assets/js/spatial-utils.js' | relative_url }}"></script>
<script src="{{ '/assets/js/data-loader.js' | relative_url }}"></script>
<script src="{{ '/assets/js/zoom-layer-manager.js' | relative_url }}"></script>

<!-- Map data configuration as CSP-safe JSON data element -->
<script type="application/json" id="map-data-config">
{{ site.data.map_data_config_json }}
</script>
<script src="{{ '/assets/js/map-data-init.js' | relative_url }}"></script>
