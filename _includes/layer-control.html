<!--
  Layer Control Include
  
  Creates non-spot layer groups (rejected spots, event notices, obstacles, protected areas)
  and marker/layer creation functions. Spot markers are managed individually via the
  Marker Registry and Filter Engine instead of LayerGroups.
  
  Parameters:
  - include.locale: Current locale for filtering data (default: site.lang or 'de')
  
  Requirements: 4.1, 6.1, 8.3, 9.1, 9.2, 9.3
-->

{% assign current_locale = include.locale | default: site.lang | default: 'de' %}

<!-- Include locale filter module for data filtering (Requirement 8.3) -->
<script src="{{ '/assets/js/locale-filter.js' | relative_url }}"></script>
<!-- Include clipboard module for copy functionality (Requirements 3.2, 3.3) -->
<script src="{{ '/assets/js/clipboard.js' | relative_url }}"></script>
<!-- Include shared HTML utility functions (escapeHtml, stripHtml, truncate) before popup modules -->
<script src="{{ '/assets/js/html-utils.js' | relative_url }}"></script>
<!-- Include shared date utility functions before event notice popup module -->
<script src="{{ '/assets/js/date-utils.js' | relative_url }}"></script>
<!-- Include spot popup module for generating popup content (Requirements 3.1-3.5) -->
<script src="{{ '/assets/js/spot-popup.js' | relative_url }}"></script>
<!-- Include obstacle popup module for generating obstacle popup content (Requirement 5.3) -->
<script src="{{ '/assets/js/obstacle-popup.js' | relative_url }}"></script>
<!-- Include event notice popup module for generating event notice popup content (Requirements 7.1, 7.2, 7.3) -->
<script src="{{ '/assets/js/event-notice-popup.js' | relative_url }}"></script>

{% assign pa_type_key = "name_" | append: current_locale %}
{% assign pa_types = site.data.types.protected_area_types | where: "locale", current_locale %}
<script type="application/json" id="layer-control-config">
{
  "currentLocale": "{{ current_locale }}",
  "localePrefix": "{% if current_locale != 'de' %}/{{ current_locale }}{% endif %}",
  "protectedAreaTypeNames": {
    {% for pat in pa_types %}
    "{{ pat.slug }}": "{{ pat[pa_type_key] | default: pat.name_de }}"{% unless forloop.last %},{% endunless %}
    {% endfor %}
  }
}
</script>
<script src="{{ '/assets/js/layer-control.js' | relative_url }}"></script>
