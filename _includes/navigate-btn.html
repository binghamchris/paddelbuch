<!--
  Navigate Button Include
  
  Renders a button that opens an external mapping application with directions
  to the specified coordinates.
  
  Parameters:
  - include.lat: Latitude coordinate (required)
  - include.lon: Longitude coordinate (required)
  - include.class: Additional CSS classes to apply (optional)
  - include.size: Button size - 'sm', 'md', 'lg' (default: 'sm')
  
  Requirements: 11.1
-->

{% assign lat = include.lat %}
{% assign lon = include.lon %}
{% assign btn_class = include.class | default: '' %}
{% assign btn_size = include.size | default: 'sm' %}
{% assign current_locale = site.lang | default: 'de' %}

{% if lat and lon %}
<a href="https://www.google.com/maps/dir/?api=1&destination={{ lat }},{{ lon }}" 
   target="_blank" 
   rel="noopener noreferrer"
   class="btn btn-{{ btn_size }} btn-outline-primary navigate-btn {{ btn_class }}"
   title="{% t actions.navigate %}"
   aria-label="{% t actions.navigate %}">
  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" class="navigate-icon">
    <path fill-rule="evenodd" d="M8 0a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5v1.5a.5.5 0 0 1-1 0V3H6a.5.5 0 0 1 0-1h1.5V.5A.5.5 0 0 1 8 0z"/>
    <path d="M8 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM3 8a5 5 0 1 1 10 0A5 5 0 0 1 3 8z"/>
    <path d="M8 5.5a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5V10a.5.5 0 0 1-1 0V8.5H6a.5.5 0 0 1 0-1h1.5V6a.5.5 0 0 1 .5-.5z"/>
  </svg>
  {% t actions.navigate %}
</a>
{% endif %}
