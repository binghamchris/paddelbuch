version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - npm ci
        - npm run download-fonts
        - npm run copy-assets
        - rvm install 3.4.9
        - rvm use 3.4.9
        - bundle install
    build:
      commands:
        - bundle exec jekyll build --verbose
        - npm test
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - vendor/**/*
      - node_modules/**/*
      - _data/**/*
      - .jekyll-cache/**/*
