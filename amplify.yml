version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export LANG=en_US.UTF-8
        - export LC_ALL=en_US.UTF-8
        - npm ci
        - npm run download-fonts
        - npm run copy-assets
        - bundle install
    build:
      commands:
        - bundle exec rake build:site
        - npm test
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - vendor/**/*
      - node_modules/**/*
      - _data/**/*
      - .jekyll-cache/**/*
