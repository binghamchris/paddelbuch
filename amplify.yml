version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - npm ci
        - npm run download-fonts
        - npm run copy-assets
        - bundle install
    build:
      commands:
        - bundle exec jekyll build --verbose
        - npm test || true
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - vendor/**/*
      - node_modules/**/*
      - _data/**/*
