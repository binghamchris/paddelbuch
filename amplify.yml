version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install Ruby 3.3.0 using rbenv (skip if cached)
        - |
          export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
          if [ ! -d "$HOME/.rbenv/versions/3.3.0" ]; then
            echo "Ruby 3.3.0 not found in cache — installing from source"
            curl -fsSL https://github.com/rbenv/rbenv-installer/raw/HEAD/bin/rbenv-installer | bash
            eval "$(rbenv init -)"
            rbenv install 3.3.0
          else
            echo "Ruby 3.3.0 found in cache — skipping compilation"
            eval "$(rbenv init -)"
          fi
          rbenv global 3.3.0
          ruby -v
        # Install bundler and gems
        - export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
        - eval "$(rbenv init -)"
        - gem install bundler
        - bundle config set --local path 'vendor/bundle'
        - bundle install
        # Install Node.js dependencies for testing (optional)
        - npm ci
    build:
      commands:
        # Set Ruby environment
        - export PATH="$HOME/.rbenv/bin:$HOME/.rbenv/shims:$PATH"
        - eval "$(rbenv init -)"
        # Build Jekyll site
        - bundle exec jekyll build --verbose
        # Run tests (optional, can be disabled if needed)
        - npm test || true
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - vendor/**/*
      - node_modules/**/*
      - $HOME/.rbenv/**/*
      - _data/.contentful_sync_cache.yml
