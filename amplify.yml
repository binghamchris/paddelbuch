version: 1
frontend:
  phases:
    preBuild:
      commands:
        - bundle install
        - npm ci
    build:
      commands:
        - bundle exec jekyll build --verbose
        - npm test || true
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths:
      - vendor/**/*
      - node_modules/**/*
      - _data/.contentful_sync_cache.yml
