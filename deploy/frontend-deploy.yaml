AWSTemplateFormatVersion: "2010-09-09"
Description: Paddel Buch Amplify deployment
Parameters:
  AppName:
    Type: String
    Description: The name for the app in Amplify
  AppDomainName:
    Type: String
    Description: The domain name the app should be served on (only required for PRODUCTION stage)
    Default: ""
  AppDescription:
    Type: String
    Description: The description for the app in Amplify
  AppStage:
    Type: String
    Description: The stage for this deployment
    AllowedValues:
      - PRODUCTION
      - BETA
      - DEVELOPMENT
      - EXPERIMENTAL
      - PULL_REQUEST
  EnvVarMapboxUrl:
    Type: String
    Description: The URL for the MapBox map style to be used during the Jekyll build process
    NoEcho: true
  EnvVarContentfulToken:
    Type: String
    Description: The API token for accessing the Contentful API during the Jekyll build process
    NoEcho: true
  EnvVarContentfulSpace:
    Type: String
    Description: The Contentful space ID to use for accessing the Contentful API during the Jekyll build process
  EnvVarContentfulEnv:
    Type: String
    Description: The Contentful environment ID for accessing the Contentful API during the Jekyll build process
  EnvVarSiteUrl:
    Type: String
    Description: The production site URL for Jekyll build (only required for PRODUCTION stage)
    Default: ""
  GithubRepoUrl:
    Type: String
    Description: The URL of the GitHub repo to be deployed
  GithubBranchName:
    Type: String
    Description: The name of branch in the GitHub repo to be used for deployment
  GithubToken:
    Type: String
    Description: The GitHub personal access token to be used during the setup of the Amplify app
    NoEcho: true
  CustomBuildImageUri:
    Type: String
    Description: The ECR image URI for the custom Amplify build image (leave empty to use default Amplify image)
    Default: ""
Conditions:
  IsProduction:
    !Equals
      - !Ref AppStage
      - PRODUCTION
Resources:
  PaddelBuchApp:
    Type: AWS::Amplify::App
    Properties: 
      AccessToken:
        Ref: GithubToken
      CustomHeaders: |-
        customHeaders:
          # Security and default cache headers for all files (recursive)
          - pattern: '**/*'
            headers:
              - key: Cache-Control
                value: public, max-age=21600, s-maxage=21600
              - key: Strict-Transport-Security
                value: max-age=31536000; includeSubDomains; preload
              - key: X-Frame-Options
                value: DENY
              - key: X-XSS-Protection
                value: 1; mode=block
              - key: X-Content-Type-Options
                value: nosniff
              - key: Referrer-Policy
                value: strict-origin-when-cross-origin
              - key: Content-Security-Policy
                value: >-
                  default-src 'self'; img-src 'self' data:
                  raw.githubusercontent.com api.mapbox.com; style-src 'self';
                  script-src 'self' https://tinylytics.app; font-src 'self' data:;
                  connect-src 'self' tiles.openfreemap.org https://tinylytics.app;
                  worker-src 'self' blob:
              - key: Permissions-Policy
                value: >-
                  accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(),
                  camera=(), cross-origin-isolated=(), display-capture=(),
                  document-domain=(), encrypted-media=(),
                  execution-while-not-rendered=(), execution-while-out-of-viewport=(),
                  fullscreen=(self), geolocation=(self), gyroscope=(), magnetometer=(),
                  microphone=(), midi=(), navigation-override=(), payment=(),
                  picture-in-picture=(), publickey-credentials-get=(),
                  screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(),
                  xr-spatial-tracking=(), clipboard-read=(), clipboard-write=(),
                  gamepad=(), speaker-selection=(), conversion-measurement=(),
                  focus-without-user-activation=(), hid=(), idle-detection=(),
                  serial=(), sync-script=(), trust-token-redemption=(),
                  vertical-scroll=(self)
          # HTML pages - 1 day TTL - site changes infrequently
          - pattern: '*.html'
            headers:
              - key: Cache-Control
                value: public, max-age=86400, s-maxage=86400, must-revalidate
          # Spatial tile JSON files - long TTL (7 days) as they only change on rebuild
          - pattern: '/api/tiles/**/*.json'
            headers:
              - key: Cache-Control
                value: public, max-age=604800, s-maxage=604800, immutable
          # API JSON files - 1 day TTL
          - pattern: '/api/*.json'
            headers:
              - key: Cache-Control
                value: public, max-age=86400, s-maxage=86400
          # Static assets (CSS, JS, images) - long TTL (30 days)
          - pattern: '/assets/**/*'
            headers:
              - key: Cache-Control
                value: public, max-age=2592000, s-maxage=2592000, immutable
      CustomRules:
        !If
          - IsProduction
          - - Source:
                !Join
                  - ""
                  - - https://
                    - Ref: AppDomainName 
              Status: 302
              Target:
                !Join
                  - "."
                  - - https://www
                    - Ref: AppDomainName
          - !Ref AWS::NoValue
      Description:
        Ref: AppDescription
      EnableBranchAutoDeletion: False
      EnvironmentVariables: 
        - Name: MAPBOX_URL
          Value:
            Ref: EnvVarMapboxUrl
        - Name: CONTENTFUL_ACCESS_TOKEN
          Value:
            Ref: EnvVarContentfulToken
        - Name: CONTENTFUL_SPACE_ID
          Value:
            Ref: EnvVarContentfulSpace
        - Name: CONTENTFUL_ENVIRONMENT
          Value:
            Ref: EnvVarContentfulEnv
        - Name: JEKYLL_ENV
          Value: production
        - Name: _CUSTOM_IMAGE
          Value:
            Ref: CustomBuildImageUri
      Name:
        Ref: AppName
      Repository:
        Ref: GithubRepoUrl
      Tags: 
        - Key: app
          Value:
            Ref: AppName
        - Key: stage
          Value:
            Ref: AppStage
  PaddelBuchBranch:
    Type: AWS::Amplify::Branch
    Properties: 
      AppId:
        !GetAtt PaddelBuchApp.AppId
      BranchName:
        Ref: GithubBranchName
      EnableAutoBuild: True
      EnablePerformanceMode: False
      EnablePullRequestPreview: True
      EnvironmentVariables:
        - Name: SITE_URL
          Value:
            !If
              - IsProduction
              - !Ref EnvVarSiteUrl
              - !Sub "https://${GithubBranchName}.${PaddelBuchApp.AppId}.amplifyapp.com"
      Stage:
        Ref: AppStage
      Tags: 
        - Key: app
          Value:
            Ref: AppName
        - Key: stage
          Value:
            Ref: AppStage
  PaddelBuchDomain:
    Type: AWS::Amplify::Domain
    Condition: IsProduction
    Properties: 
      AppId:
        !GetAtt PaddelBuchApp.AppId
      DomainName:
        Ref: AppDomainName
      EnableAutoSubDomain: False
      SubDomainSettings:
        - BranchName:
            !GetAtt PaddelBuchBranch.BranchName
          Prefix: ""
        - BranchName:
            !GetAtt PaddelBuchBranch.BranchName
          Prefix: www

