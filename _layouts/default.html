<!DOCTYPE html>
<html lang="{{ site.lang | default: page.lang | default: site.default_lang }}">
<head>
  {% include resolve-meta.html %}

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if _resolved_description %}{{ _resolved_description | strip_html | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | truncate: 160 | escape }}{% endif %}">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if _resolved_title %}{{ _resolved_title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{% if _resolved_description %}{{ _resolved_description | strip_html | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | truncate: 160 | escape }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url | replace: 'index.html', '' }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{% if site.lang == 'en' %}en_GB{% else %}de_CH{% endif %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% if _resolved_title %}{{ _resolved_title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta name="twitter:description" content="{% if _resolved_description %}{{ _resolved_description | strip_html | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | truncate: 160 | escape }}{% endif %}">

  <title>{% if _resolved_title %}{{ _resolved_title | escape }} | {% endif %}{{ site.title | escape }}</title>
  
  <!-- Fonts -->
  <link rel="stylesheet" href="{{ '/assets/css/vendor/fonts.css' | relative_url }}">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/vendor/leaflet.css' | relative_url }}">
  
  <!-- MapLibre GL CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/vendor/maplibre-gl.css' | relative_url }}">
  
  <!-- Leaflet Locate Control CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/vendor/L.Control.Locate.min.css' | relative_url }}">
  
  <!-- Site Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/application.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/logo-favicon.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  
  {% include color-vars.html %}
</head>
<body class="{% if page.pageName %}page-{{ page.pageName }}{% endif %}{% if page.slug %} slug-{{ page.slug }}{% endif %}">
  <div class="wrapper">
    {% include header.html %}
    
    <main>
      {{ content }}
    </main>
    
  </div>
  
  <!-- Bootstrap JS Bundle -->
  <script src="{{ '/assets/js/vendor/bootstrap.bundle.min.js' | relative_url }}"></script>
  
  <!-- Leaflet JS -->
  <script src="{{ '/assets/js/vendor/leaflet.js' | relative_url }}"></script>
  
  <!-- MapLibre GL JS -->
  <script src="{{ '/assets/js/vendor/maplibre-gl.js' | relative_url }}"></script>
  
  <!-- Leaflet MapLibre GL Bridge -->
  <script src="{{ '/assets/js/vendor/leaflet-maplibre-gl.js' | relative_url }}"></script>
  
  <!-- Leaflet Locate Control JS -->
  <script src="{{ '/assets/js/vendor/L.Control.Locate.min.js' | relative_url }}"></script>
  
  <!-- Page-specific scripts -->
  {% if page.scripts %}
    {% for script in page.scripts %}
    <script src="{{ script | relative_url }}"></script>
    {% endfor %}
  {% endif %}

  <!-- Tinylytics analytics -->
  <script src="https://tinylytics.app/embed/DWSnjEu6fgk9s2Yu2H4a/min.js?events&beacon" defer></script>
</body>
</html>
