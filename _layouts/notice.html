---
layout: default
pageName: notice-details
---
<!--
  Event Notice Detail Layout
  
  Displays an event notice detail page with bounded map (8 cols) + details panel (4 cols).
  Shows: full description, start date, end date, last updated timestamp.
  Map bounds are calculated from the event notice's affected area GeoJSON geometry.
  
  Collection permalink: /gewaesserereignisse/:slug/
  
  Requirements: 7.4, 13.4
  Property 16: Event Notice Detail Page Contains Required Information
  
  For any event notice, the detail page shall display the full description,
  start date, end date, and last updated timestamp.
-->

{% assign current_locale = site.lang | default: 'de' %}
{% assign notice = page %}

<div class="container-fluid">
  <div class="row">
    <!-- Map Column (8 cols on large screens) -->
    <div class="col-lg-8 p-0">
      <div id="notice-map" class="map"></div>
    </div>
    
    <!-- Details Panel (4 cols on large screens) -->
    <div class="col-lg-4 notice-description">
      <!-- Event Notice Type Badge -->
      <div class="notice-icon-div d-flex align-items-center">
        <span>{% t event_notices.title %}</span>
      </div>
      
      <!-- Notice Title -->
      <h1 class="notice-title">{{ notice.name }}</h1>
      
      <!-- Notice Details Content -->
      {% include notice-detail-content.html notice=notice %}
    </div>
  </div>
</div>

<!-- Map Initialization Script -->
<script src="{{ '/assets/js/layer-styles.js' | relative_url }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  /**
   * Event Notice Detail Map Initialization
   * 
   * Property 16: Event Notice Detail Page Contains Required Information
   * For any event notice, the detail page shall display the full description,
   * start date, end date, and last updated timestamp.
   * 
   * Validates: Requirements 7.4
   */
  
  // Parse affected area geometry
  {% if notice.affectedArea %}
  var geometryData = {{ notice.affectedArea | jsonify }};
  var geometry;
  
  // Handle both string and object geometry
  if (typeof geometryData === 'string') {
    try {
      geometry = JSON.parse(geometryData);
    } catch (e) {
      console.error('Failed to parse affected area geometry:', e);
      geometry = null;
    }
  } else {
    geometry = geometryData;
  }
  
  // Initialize map with default Switzerland center
  var map = L.map('notice-map', {
    center: [{{ site.map.center.lat }}, {{ site.map.center.lon }}],
    zoom: {{ site.map.default_zoom }},
    zoomControl: true
  });
  
  // Add Mapbox tile layer
  L.tileLayer('{{ site.mapbox_url | default: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" }}', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: {{ site.map.max_zoom | default: 18 }}
  }).addTo(map);
  
  // Position zoom control at bottom-right
  map.zoomControl.setPosition('bottomright');
  
  if (geometry) {
    // Create GeoJSON layer for affected area (yellow semi-transparent polygon)
    var affectedAreaLayer = L.geoJSON(geometry, {
      style: PaddelbuchLayerStyles.getLayerStyle('eventNoticeArea')
    }).addTo(map);
    
    // Calculate and fit bounds from geometry
    var bounds = affectedAreaLayer.getBounds();
    if (bounds.isValid()) {
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  }
  
  // Add marker at notice location if available
  {% if notice.location %}
  {% assign lat = notice.location.lat | default: notice.location.latitude %}
  {% assign lon = notice.location.lon | default: notice.location.lng | default: notice.location.longitude %}
  {% if lat and lon %}
  var noticeLat = {{ lat }};
  var noticeLon = {{ lon }};
  
  // Create event notice marker icon
  var eventIcon = L.icon({
    iconUrl: '{{ "/assets/images/markers/waterwayevent.svg" | relative_url }}',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
  });
  
  var marker = L.marker([noticeLat, noticeLon], { icon: eventIcon }).addTo(map);
  marker.bindPopup('<strong>{{ notice.name | escape }}</strong>');
  
  // If no affected area geometry, center on marker
  {% unless notice.affectedArea %}
  map.setView([noticeLat, noticeLon], 14);
  {% endunless %}
  {% endif %}
  {% endif %}
  
  {% else %}
  // No affected area geometry - check for location
  {% if notice.location %}
  {% assign lat = notice.location.lat | default: notice.location.latitude %}
  {% assign lon = notice.location.lon | default: notice.location.lng | default: notice.location.longitude %}
  {% if lat and lon %}
  var noticeLat = {{ lat }};
  var noticeLon = {{ lon }};
  
  var map = L.map('notice-map', {
    center: [noticeLat, noticeLon],
    zoom: 14,
    zoomControl: true
  });
  
  // Add Mapbox tile layer
  L.tileLayer('{{ site.mapbox_url | default: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" }}', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: {{ site.map.max_zoom | default: 18 }}
  }).addTo(map);
  
  map.zoomControl.setPosition('bottomright');
  
  // Create event notice marker icon
  var eventIcon = L.icon({
    iconUrl: '{{ "/assets/images/markers/waterwayevent.svg" | relative_url }}',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
  });
  
  var marker = L.marker([noticeLat, noticeLon], { icon: eventIcon }).addTo(map);
  marker.bindPopup('<strong>{{ notice.name | escape }}</strong>');
  {% else %}
  // No location - show default Switzerland view
  var map = L.map('notice-map', {
    center: [{{ site.map.center.lat }}, {{ site.map.center.lon }}],
    zoom: {{ site.map.default_zoom }},
    zoomControl: true
  });
  
  L.tileLayer('{{ site.mapbox_url | default: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" }}', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: {{ site.map.max_zoom | default: 18 }}
  }).addTo(map);
  
  map.zoomControl.setPosition('bottomright');
  {% endif %}
  {% else %}
  // No location - show default Switzerland view
  var map = L.map('notice-map', {
    center: [{{ site.map.center.lat }}, {{ site.map.center.lon }}],
    zoom: {{ site.map.default_zoom }},
    zoomControl: true
  });
  
  L.tileLayer('{{ site.mapbox_url | default: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" }}', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: {{ site.map.max_zoom | default: 18 }}
  }).addTo(map);
  
  map.zoomControl.setPosition('bottomright');
  {% endif %}
  {% endif %}
});
</script>
