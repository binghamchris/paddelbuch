---
layout: default
pageName: waterway-details
---
<!--
  Waterway Detail Layout
  
  Displays a waterway detail page with bounded map (8 cols) + details panel (4 cols).
  Shows: waterway name and list of active event notices for that waterway.
  Map bounds are calculated from the waterway's GeoJSON geometry.
  All data layers (spots, obstacles, protected areas, event notices) are loaded.
  
  Collection permalink: /gewaesser/:slug/
  
  Requirements: 4.5, 4.6, 13.2
  Property 7: Waterway Detail Map Bounds
-->

{% assign current_locale = site.lang | default: 'de' %}
{% assign waterway = page %}

<div class="container-fluid">
  <div class="row">
    <!-- Map Column (8 cols on large screens) -->
    <div class="col-lg-8 p-0">
      <div id="waterway-map" class="map"></div>
    </div>
    
    <!-- Details Panel (4 cols on large screens) -->
    <div class="col-lg-4 waterway-details">
      <!-- Waterway Title -->
      <h1 class="waterway-title">{{ waterway.name }}</h1>
      
      <!-- Event Notices Section (Requirement 4.5, 7.5) -->
      {% include event-list.html waterway_slug=waterway.slug %}
    </div>
  </div>
</div>

<!-- Map Configuration (CSP-safe JSON, not executed) -->
<script type="application/json" id="map-config">
{
  "center": { "lat": {{ site.map.center.lat }}, "lon": {{ site.map.center.lon }} },
  "zoom": {{ site.map.default_zoom }},
  "maxZoom": {{ site.map.max_zoom | default: 18 }},
  "mapboxUrl": "{{ site.mapbox_url }}",
  "locale": "{{ current_locale }}",
  "geometry": {% if waterway.geometry %}{{ waterway.geometry | jsonify }}{% else %}null{% endif %}
}
</script>
<script src="{{ '/assets/js/paddelbuch-map.js' | relative_url }}"></script>
<script src="{{ '/assets/js/waterway-map.js' | relative_url }}"></script>

<!-- Load all data layers (spots, obstacles, protected areas, event notices) -->
{% include detail-map-layers.html locale=current_locale %}
